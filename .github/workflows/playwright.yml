name: Playwright Tests (Headless)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Instalar dependências
        run: npm ci

      - name: 🎭 Instalar browsers do Playwright
        run: npx playwright install --with-deps

      - name: 🧪 Gerar BDD + rodar testes
        run: |
          npx bddgen
          npx playwright test

      - name: 📸 Upload de artefatos (screenshots, videos)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
            screenshots/